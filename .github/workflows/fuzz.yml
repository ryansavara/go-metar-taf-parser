name: Fuzz
on:
  schedule:
    - cron: '0 6 * * 1'

permissions: {}

jobs:
  fuzz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Install dependencies
        run: go mod download

      - name: Fuzz (2m per target)
        run: |
          go test -fuzz='^FuzzParseMetar$' -fuzztime=2m -count=1 .
          go test -fuzz='^FuzzParseTAF$' -fuzztime=2m -count=1 .
          go test -fuzz='^FuzzParseMetarDated$' -fuzztime=2m -count=1 .
          go test -fuzz='^FuzzParseTAFDated$' -fuzztime=2m -count=1 .
          go test -fuzz='^FuzzParseTAFAsForecast$' -fuzztime=2m -count=1 .
          go test -fuzz='^FuzzGetCompositeForecastForDate$' -fuzztime=2m -count=1 .
